# The file path will be ~/.config/kitty/kitty.conf

# Jump to specific windows (tabs) using Ctrl + Shift + Number
map ctrl+shift+1 goto_tab 1
map ctrl+shift+2 goto_tab 2
map ctrl+shift+3 goto_tab 3
map ctrl+shift+4 goto_tab 4
map ctrl+shift+5 goto_tab 5
map ctrl+shift+6 goto_tab 6
map ctrl+shift+7 goto_tab 7
map ctrl+shift+8 goto_tab 8
map ctrl+shift+9 goto_tab 9

# Never auto-change split orientation
enabled_layouts splits

# Create a new window splitting the space used by the existing one so that
# the two windows are placed one above the other
map ctrl+shift+down launch --location=hsplit

# Create a new window splitting the space used by the existing one so that
# the two windows are placed side by side
map ctrl+shift+right launch --location=vsplit

# Format for the tab name
tab_title_template "{index}: {title}
